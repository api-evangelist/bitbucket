aid: bitbucket
name: Bitbucket
description: >-
  Bitbucket is a Git-based source code repository hosting service owned by
  Atlassian offering both commercial plans and free accounts with unlimited
  private repositories, along with CI/CD pipelines, code reviews via pull
  requests, and code collaboration tools for development teams.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Atlassian
  - CI/CD
  - Code Collaboration
  - Code Review
  - DevOps
  - Git
  - Pull Requests
  - Repository Hosting
  - Version Control
url: >-
  https://raw.githubusercontent.com/api-evangelist/bitbucket/refs/heads/main/apis.yml
created: '2024-01-01'
modified: '2026-04-18'
specificationVersion: '0.19'
apis:
  - aid: bitbucket:bitbucket-cloud-rest-api
    name: Bitbucket Cloud REST API
    description: >-
      The REST API for Bitbucket Cloud allows you to build apps using any
      language, exposing operations on repositories, pull requests, commits,
      pipelines, workspaces, projects, webhooks, issues, and users.
    humanURL: https://developer.atlassian.com/bitbucket/api/2/reference/
    baseURL: https://api.bitbucket.org/2.0
    tags:
      - Commits
      - Pipelines
      - Pull Requests
      - Repositories
      - REST
      - Webhooks
      - Workspaces
