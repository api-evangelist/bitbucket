aid: bitbucket
name: Bitbucket
description: Bitbucket is a Git-based source code repository hosting service owned by Atlassian offering
  both commercial plans and free accounts with unlimited private repositories, along with CI/CD pipelines,
  code reviews via pull requests, and code collaboration tools for development teams.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
