      properties:
        actor:
          $ref: '#/components/schemas/Account'
        repository:
          $ref: '#/components/schemas/Repository'
        pullrequest:
          $ref: '#/components/schemas/PullRequest'
        comment:
          $ref: '#/components/schemas/Comment'
    IssuePayload:
      type: object
      description: Payload for the issue:created event.
      properties:
