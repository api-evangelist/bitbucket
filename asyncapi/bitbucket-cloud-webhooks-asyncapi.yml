        repository:
          $ref: '#/components/schemas/Repository'
    IssueUpdatedPayload:
      type: object
      description: Payload for the issue:updated event.
      properties:
        actor:
          $ref: '#/components/schemas/Account'
        issue:
          $ref: '#/components/schemas/Issue'
        repository:
          $ref: '#/components/schemas/Repository'
        comment:
          $ref: '#/components/schemas/Comment'
